<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<title>Connectia × Bodega Aurrerá — Selector de Sitios</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
:root{--indigo:#201040;--violet:#6030A0;--hot:#7B3FF2;--mist:#E9E6F0}
html,body{margin:0;height:100%;font-family:'Inter','Helvetica Neue',Arial,sans-serif}
#app{display:flex;height:100vh;flex-direction:column}
#hdr{background:var(--indigo);color:#fff;padding:8px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
#hdr img.cn{height:26px}#hdr img.ba{height:30px;border-radius:4px}
#hdr h1{font-size:14px;margin:0;font-weight:800;letter-spacing:.2px}
.badge{background:var(--violet);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700}
.badge.green{background:#2E7D32}
#hdr button{background:var(--hot);color:#fff;border:0;border-radius:6px;padding:7px 12px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}
#hdr button.sec{background:transparent;border:1px solid var(--hot)}
#main{display:flex;flex:1;min-height:0}
#side{width:360px;min-width:280px;display:flex;flex-direction:column;border-right:2px solid var(--mist)}
#controls{padding:10px;border-bottom:1px solid var(--mist);display:flex;gap:6px;flex-wrap:wrap}
#controls input,#controls select{font-family:inherit;font-size:12px;padding:6px;border:1px solid #ccc;border-radius:6px;flex:1}
#controls .mini{background:var(--mist);border:0;border-radius:6px;padding:6px 8px;font-size:11px;font-weight:700;cursor:pointer;color:var(--violet)}
#list{flex:1;overflow-y:auto}
.row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid #f1eef7;font-size:12px;cursor:pointer}
.row:hover{background:#faf8ff}
.row.off{opacity:.45}
.row b{color:var(--violet)}
.row .t{margin-left:auto;font-weight:700;white-space:nowrap}
#map{flex:1}
#prev{position:fixed;right:14px;bottom:14px;width:460px;height:330px;background:#fff;border:2px solid var(--violet);border-radius:10px;box-shadow:0 8px 30px rgba(32,16,64,.35);display:none;z-index:2000;overflow:hidden}
#prev .ph{background:var(--indigo);color:#fff;font-size:12px;font-weight:700;padding:6px 10px;display:flex;justify-content:space-between}
#prev .ph a{color:#C8FF00;text-decoration:none}
#prev iframe{width:100%;height:calc(100% - 30px);border:0}
.leaflet-popup-content{font-family:Inter,Arial,sans-serif;font-size:12px}
.pp b{color:var(--violet)}
.pp button{margin-top:6px;background:var(--violet);color:#fff;border:0;border-radius:5px;padding:5px 9px;font-weight:700;cursor:pointer;font-family:inherit}
#gate{position:fixed;inset:0;background:linear-gradient(135deg,#201040,#502090,#6030A0);display:flex;align-items:center;justify-content:center;z-index:9999}
#gate .card{background:#fff;border-radius:14px;padding:36px 40px;text-align:center;max-width:340px;font-family:'Inter',Arial,sans-serif}
#gate img{height:40px;margin-bottom:14px}
#gate h2{font-size:15px;color:#201040;margin:0 0 16px}
#gate input{width:100%;box-sizing:border-box;padding:10px;border:1.5px solid #E9E6F0;border-radius:8px;font-size:14px;text-align:center;font-family:inherit}
#gate button{margin-top:12px;width:100%;background:#6030A0;color:#fff;border:0;border-radius:8px;padding:10px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
#gate .err{color:#c62828;font-size:12px;height:16px;margin-top:8px}</style></head><body>

// preview de ficha tecnica (hover)
let hideT=null;
function showPrev(s){
  if(!s.f)return;
  clearTimeout(hideT);
  const p=document.getElementById('prev');
  const f=document.getElementById('prevF');
  const url=`https://drive.google.com/file/d/${s.f}/preview`;
  if(f.dataset.k!==s.k){f.src=url;f.dataset.k=s.k;}
  document.getElementById('prevT').textContent='Ficha · '+s.k;
  document.getElementById('prevL').href=`https://drive.google.com/file/d/${s.f}/view`;
  p.style.display='block';
}
function hidePrevSoon(){clearTimeout(hideT);hideT=setTimeout(()=>{document.getElementById('prev').style.display='none'},600);}
document.getElementById('prev').onmouseenter=()=>clearTimeout(hideT);
document.getElementById('prev').onmouseleave=hidePrevSoon;

function popupHtml(s){
  const on=sel.has(s.k);
  return `<div class="pp"><b>${s.k}</b> · ${s.ent}<br>${s.dir||''}<br>${s.dim||''} · ${s.estr||''} · Ilum: ${s.il||'—'}<br><b>${fmt(s.t)}</b> /mes<br>
  <a href="https://www.google.com/maps?q=${s.lat},${s.lng}" target="_blank">Google Maps</a>${s.f?` · <a href="https://drive.google.com/file/d/${s.f}/view" target="_blank">Ficha técnica</a>`:''}<br>
  <button onclick="toggle('${s.k}')">${on?'✗ Quitar de la propuesta':'✓ Agregar a la propuesta'}</button></div>`;
}
function paint(){
  SITES.forEach(s=>{const m=markers[s.k];if(!m)return;
    m.setStyle(sel.has(s.k)?{fillColor:'#6030A0',fillOpacity:.95,radius:8}:{fillColor:'#9e9e9e',fillOpacity:.45,radius:6});});
  const tot=SITES.filter(s=>sel.has(s.k)).reduce((a,s)=>a+(s.t||0),0);
  document.getElementById('bSel').textContent=sel.size+' / '+SITES.length+' sitios';
  document.getElementById('bTot').textContent='Total mensual: '+fmt(tot);
  document.getElementById('bBA').textContent=STORES.length+' Bodega Aurrerá';
}
function toggle(k){sel.has(k)?sel.delete(k):sel.add(k);save();paint();renderList();
  const m=markers[k];if(m&&m.isPopupOpen())m.setPopupContent(popupHtml(SITES.find(s=>s.k===k)));}
function visible(){
  const q=document.getElementById('q').value.toLowerCase(),e=document.getElementById('fEnt').value;
  return SITES.filter(s=>(!e||s.ent===e)&&(!q||`${s.k} ${s.col} ${s.mun} ${s.dir}`.toLowerCase().includes(q)));
}
function renderList(){
  const box=document.getElementById('list');box.innerHTML='';
  visible().forEach(s=>{
    const d=document.createElement('div');d.className='row'+(sel.has(s.k)?'':' off');
    d.innerHTML=`<input type="checkbox" ${sel.has(s.k)?'checked':''}> <span><b>${s.k}</b><br>${s.mun||''}, ${s.ent}</span><span class="t">${fmt(s.t)}</span>`;
    d.querySelector('input').onclick=ev=>{ev.stopPropagation();toggle(s.k)};
    d.onclick=()=>{const m=markers[s.k];if(m){map.setView(m.getLatLng(),14);m.openPopup();}};
    d.onmouseenter=()=>showPrev(s); d.onmouseleave=hidePrevSoon;
    box.appendChild(d);});
}
function setAll(v){visible().forEach(s=>v?sel.add(s.k):sel.delete(s.k));save();paint();renderList();}

const WIDTHS=[14,52,26,22,18,9,11,11,7,18,9,20,14,16,14,12,15];
const MONEY='_-"$"* #,##0.00_-;\\-"$"* #,##0.00_-;_-"$"* "-"??_-;_-@_-';
const F_DATA={name:'Inter',bold:true,size:11,color:{argb:'FF000000'}};
const F_HEAD={name:'Inter',bold:true,size:11,color:{argb:'FFFFFFFF'}};
const F_LINK={name:'Inter',bold:true,size:11,color:{argb:'FF0563C1'},underline:true};
const FILL_V={type:'pattern',pattern:'solid',fgColor:{argb:'FF6030A0'}};
const FILL_W={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFFFFF'}};
function buildSheet(wbx,name,title,rows,imgCn,imgBa){
  const w=wbx.addWorksheet(name.substring(0,31),{views:[{state:'frozen',ySplit:5,showGridLines:false}]});
  w.columns=WIDTHS.map(x=>({width:x}));
  w.getRow(2).height=40;w.getRow(3).height=50;w.getRow(4).height=12;w.getRow(5).height=50;
  w.addImage(imgCn,{tl:{col:10,row:1},ext:{width:103,height:52}});
  w.addImage(imgBa,{tl:{col:12,row:1},ext:{width:132,height:44}});
  w.mergeCells('A3:J3');
  const t=w.getCell('A3');t.value=title;t.font={name:'Inter',bold:true,size:26,color:{argb:'FF000000'}};t.alignment={horizontal:'left',vertical:'middle'};
  HEADERS.forEach((h,i)=>{const c=w.getRow(5).getCell(i+1);c.value=h;c.font=F_HEAD;c.fill=FILL_V;c.alignment={horizontal:'center',vertical:'middle',wrapText:true};});
  let r=6;
  rows.forEach(s=>{
    const row=w.getRow(r);row.height=17;
    const vals=[s.k,s.dir,s.col,s.mun,s.ent,s.cp,s.lat,s.lng,s.vista,s.dim,s.m2,s.estr,s.lona,s.t];
    vals.forEach((v,i)=>{const c=row.getCell(i+1);c.value=v;c.font=F_DATA;c.fill=FILL_W;c.alignment={vertical:'middle'};if(i===13)c.numFmt=MONEY;});
    const cu=row.getCell(15);cu.fill=FILL_W;cu.alignment={horizontal:'center',vertical:'middle'};
    if(typeof s.lat==='number'){cu.value={text:'Ver en Maps',hyperlink:`https://www.google.com/maps?q=${s.lat},${s.lng}`};cu.font=F_LINK;}
    const ci=row.getCell(16);ci.value=s.il;ci.font=F_DATA;ci.fill=FILL_W;ci.alignment={horizontal:'center',vertical:'middle'};
    const cf=row.getCell(17);cf.fill=FILL_W;cf.alignment={horizontal:'center',vertical:'middle'};
    if(s.f){cf.value={text:'Ver ficha',hyperlink:`https://drive.google.com/file/d/${s.f}/view`};cf.font=F_LINK;}
    r++;});
  const tr=w.getRow(r);tr.height=22;
  for(let i=1;i<=17;i++){tr.getCell(i).fill=FILL_V;}
  tr.getCell(1).value='TOTAL MENSUAL';tr.getCell(1).font=F_HEAD;tr.getCell(1).alignment={horizontal:'left',vertical:'middle'};
  tr.getCell(14).value={formula:`SUM(N6:N${r-1})`};tr.getCell(14).font=F_HEAD;tr.getCell(14).numFmt=MONEY;tr.getCell(14).alignment={horizontal:'right',vertical:'middle'};
}
async function exportXlsx(){
  const chosen=SITES.filter(s=>sel.has(s.k));
  if(!chosen.length){alert('No hay sitios seleccionados');return;}
  const wbx=new ExcelJS.Workbook();
  const imgCn=wbx.addImage({base64:LOGOP,extension:'png'});
  const imgBa=wbx.addImage({base64:BALOCK,extension:'png'});
  buildSheet(wbx,'Total','Connectia × Bodega Aurrerá — Selección',chosen,imgCn,imgBa);
  const ents=[...new Set(chosen.map(s=>s.ent))];
  ents.forEach(e=>buildSheet(wbx,e.replace(/[\\\/\?\*\[\]]/g,'-'),`Connectia × Bodega Aurrerá — ${e}`,chosen.filter(s=>s.ent===e),imgCn,imgBa));
  const buf=await wbx.xlsx.writeBuffer();
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}));
  a.download=`Connectia_BodegaAurrera_${chosen.length}sitios.xlsx`;a.click();
}
function exportKml(){
  const esc=t=>String(t??'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
  let k='<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>Connectia × Bodega Aurrerá — Selección</name>';
  SITES.filter(s=>sel.has(s.k)&&typeof s.lat==='number').forEach(s=>{
    k+=`<Placemark><name>${esc(s.k)}</name><description>${esc(s.dir)} — ${esc(s.dim)} — ${fmt(s.t)}/mes</description><Point><coordinates>${s.lng},${s.lat},0</coordinates></Point></Placemark>`;});
  k+='</Document></kml>';
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([k],{type:'application/vnd.google-earth.kml+xml'}));
  a.download='Seleccion_BodegaAurrera.kml';a.click();
}
const ents=[...new Set(SITES.map(s=>s.ent))].sort();
ents.forEach(e=>{const o=document.createElement('option');o.value=o.textContent=e;document.getElementById('fEnt').appendChild(o);});
paint();renderList();
window.toggle=toggle;window.exportXlsx=exportXlsx;window.exportKml=exportKml;window.setAll=setAll;window.renderList=renderList;
}

async function unlock(){
  const pass=document.getElementById('gpass').value;
  const err=document.getElementById('gerr');
  try{
    const b=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b(ENC.salt),iterations:ENC.iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b(ENC.nonce)},key,b(ENC.ct));
    const data=JSON.parse(new TextDecoder().decode(pt));
    SITES=data.sites;STORES=data.stores;
    if(!sel.size)SITES.forEach(s=>sel.add(s.k));
    sessionStorage.setItem('cnx_pass',pass);
    document.getElementById('gate').remove();
    boot();
  }catch(e){err.textContent='Contraseña incorrecta';}
}
window.addEventListener('load',async()=>{
  const p=sessionStorage.getItem('cnx_pass');
  if(p){document.getElementById('gpass').value=p;await unlock();}
});
</script></body></html>
